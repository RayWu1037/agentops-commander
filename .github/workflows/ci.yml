name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Syntax check
        run: |
          node --check server.js
          node --check public/app.js
          node --check scripts/test.mjs

      - name: Regression tests
        run: node scripts/test.mjs
